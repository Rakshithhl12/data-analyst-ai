<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>History — DataAnalyst AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
:root{--p:#4f46e5;--s:#7c3aed;--a:#06b6d4;--ok:#22c55e;--err:#ef4444;--warn:#f59e0b;
  --bg:#0f0f23;--card:#1a1a2e;--surf:#0f172a;--bdr:rgba(255,255,255,.08);--txt:#e2e8f0;--dim:#64748b;--sub:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}
nav{background:rgba(15,15,35,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);
  padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.brand{font-weight:800;font-size:1.15rem;color:#fff;display:flex;align-items:center;gap:.5rem}
.brand span{color:var(--a)}
.nav-links a{color:var(--sub);margin-left:1.2rem;font-size:.875rem;transition:color .2s}
.nav-links a:hover{color:#fff}
.btn-logout{background:transparent;border:1px solid rgba(239,68,68,.3);color:#f87171;
  padding:.3rem .8rem;border-radius:6px;font-size:.78rem;cursor:pointer;transition:all .2s;margin-left:.8rem}
.btn-logout:hover{background:rgba(239,68,68,.1)}
.wrap{max-width:900px;margin:3rem auto;padding:0 1.5rem}
.page-header{margin-bottom:2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.page-header h1{font-size:1.8rem;font-weight:800}
.page-header p{color:var(--dim);font-size:.875rem;margin-top:.2rem}
.btn-new{background:linear-gradient(135deg,var(--p),var(--s));border:none;color:#fff;
  padding:.55rem 1.2rem;border-radius:8px;font-size:.875rem;font-weight:600;
  cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;transition:opacity .2s}
.btn-new:hover{opacity:.85;color:#fff}
.session-item{background:var(--card);border:1px solid var(--bdr);border-radius:12px;
  padding:1.2rem 1.4rem;margin-bottom:.9rem;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:1rem;transition:border-color .2s}
.session-item:hover{border-color:rgba(79,70,229,.3)}
.session-info{display:flex;align-items:center;gap:1rem;flex:1;min-width:0}
.session-icon{width:42px;height:42px;border-radius:10px;background:rgba(79,70,229,.15);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.session-details{min-width:0}
.session-name{font-weight:600;font-size:.93rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-meta{font-size:.78rem;color:var(--dim);margin-top:.15rem}
.session-meta code{color:#a5b4fc;background:rgba(79,70,229,.12);padding:.05rem .35rem;border-radius:4px;font-size:.75rem}
.session-actions{display:flex;gap:.5rem;flex-shrink:0}
.btn-sm{padding:.38rem .9rem;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer;
  border:none;display:inline-flex;align-items:center;gap:.35rem;transition:all .2s;text-decoration:none}
.btn-view{background:rgba(79,70,229,.15);color:#a5b4fc}
.btn-view:hover{background:rgba(79,70,229,.3);color:#fff}
.btn-report{background:rgba(6,182,212,.12);color:var(--a)}
.btn-report:hover{background:rgba(6,182,212,.25);color:#fff}
.btn-del{background:rgba(239,68,68,.1);color:#f87171}
.btn-del:hover{background:rgba(239,68,68,.25)}
.pill{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .65rem;border-radius:99px;font-size:.73rem;font-weight:700}
.pill-ok{background:rgba(34,197,94,.15);color:var(--ok)}
.pill-pend{background:rgba(245,158,11,.12);color:var(--warn)}
.pill-err{background:rgba(239,68,68,.12);color:var(--err)}
.empty{text-align:center;padding:4rem 2rem;color:var(--sub)}
.empty i{font-size:3rem;color:#1e293b;display:block;margin-bottom:1rem}
.empty h3{margin-bottom:.5rem;font-size:1.1rem}
#toast-wrap{position:fixed;top:1.2rem;right:1.2rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem}
.toast-msg{background:#1e293b;border:1px solid var(--bdr);border-radius:8px;padding:.65rem 1rem;
  font-size:.84rem;color:var(--txt);max-width:300px;display:flex;align-items:center;gap:.5rem;animation:tIn .25s ease}
@keyframes tIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<nav>
  <div class="brand"><span>⚡</span>Data<span>Analyst</span> AI</div>
  <div class="nav-links">
    <a href="/"><i class="fas fa-upload me-1"></i>Upload</a>
    <a href="/dashboard"><i class="fas fa-chart-pie me-1"></i>Dashboard</a>
    <a href="/history"><i class="fas fa-history me-1"></i>History</a>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</nav>

<div class="wrap">
  <div class="page-header">
    <div>
      <h1>🗂 Session History</h1>
      <p>All your past analysis sessions</p>
    </div>
    <a href="/" class="btn-new"><i class="fas fa-plus"></i>New Analysis</a>
  </div>
  <div id="history-list"><div class="empty"><i class="fas fa-spinner fa-spin"></i><h3>Loading…</h3></div></div>
</div>

<div id="toast-wrap"></div>

<script>
async function loadHistory() {
  const res  = await fetch('/api/history');
  const data = await res.json();
  const sessions = data.sessions || [];
  const el = document.getElementById('history-list');
  if (!sessions.length) {
    el.innerHTML=`<div class="empty"><i class="fas fa-inbox"></i><h3>No sessions yet</h3>
    <p>Upload your first dataset to get started.</p>
    <a href="/" style="display:inline-flex;align-items:center;gap:.4rem;margin-top:1rem;
      background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:.6rem 1.3rem;
      border-radius:8px;font-weight:600;text-decoration:none">
      <i class="fas fa-upload"></i>Upload Dataset</a></div>`;
    return;
  }
  el.innerHTML = sessions.map(s => {
    const status = s.status || 'pending';
    const pillCls = status==='complete'?'pill-ok':status==='failed'?'pill-err':'pill-pend';
    const pillIcon = status==='complete'?'✅':status==='failed'?'❌':'⏳';
    const date = s.created_at ? new Date(s.created_at).toLocaleString() : '—';
    return `
    <div class="session-item" id="si-${s.session_id}">
      <div class="session-info">
        <div class="session-icon">📊</div>
        <div class="session-details">
          <div class="session-name">${s.filename||'Unknown file'}</div>
          <div class="session-meta">
            <code>${s.session_id.slice(0,8)}…</code>
            &nbsp;·&nbsp; ${date}
            &nbsp;·&nbsp; <span class="pill ${pillCls}">${pillIcon} ${status}</span>
          </div>
        </div>
      </div>
      <div class="session-actions">
        ${status==='complete'?`
        <button class="btn-sm btn-view" onclick="openDashboard('${s.session_id}')">
          <i class="fas fa-chart-bar"></i>Dashboard
        </button>
        <a class="btn-sm btn-report" href="/report/${s.session_id}" target="_blank">
          <i class="fas fa-file-alt"></i>Report
        </a>` : ''}
        <button class="btn-sm btn-del" onclick="deleteSession('${s.session_id}')">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>`;
  }).join('');
}

function openDashboard(sid) {
  localStorage.setItem('ada_session_id', sid);
  window.location.href = '/dashboard';
}

async function deleteSession(sid) {
  if (!confirm('Delete this session and all its data?')) return;
  const res = await fetch(`/session/${sid}`, {method:'DELETE'});
  if (res.ok) {
    document.getElementById('si-'+sid)?.remove();
    toast('Session deleted.', 'success');
    // Check if list is now empty
    if (!document.querySelector('.session-item')) loadHistory();
  } else {
    toast('Delete failed.', 'error');
  }
}

async function logout() {
  await fetch('/api/logout', {method:'POST'});
  localStorage.removeItem('ada_session_id');
  window.location.href = '/login';
}

function toast(msg, type='success') {
  const c=document.getElementById('toast-wrap');
  const d=document.createElement('div'); d.className='toast-msg';
  d.style.borderLeft=`3px solid ${type==='error'?'#ef4444':'#22c55e'}`;
  d.innerHTML=`<span>${type==='error'?'❌':'✅'}</span><span>${msg}</span>`;
  c.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),300)},4000);
}

loadHistory();
</script>
</body>
</html>
