<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
<title>Reset Password — DataAnalyst AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
:root{--p:#4f46e5;--s:#7c3aed;--a:#06b6d4;--bg:#0a0a1a;--card:#12122a;--bdr:rgba(255,255,255,.08);--txt:#e2e8f0;--dim:#64748b;--muted:#475569}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background-image:radial-gradient(ellipse 80% 60% at 50% -5%,rgba(79,70,229,.2),transparent)}
.auth-wrap{width:100%;max-width:400px}
.auth-card{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:clamp(1.5rem,5vw,2.5rem);box-shadow:0 32px 80px rgba(0,0,0,.6)}
.logo{text-align:center;margin-bottom:1.8rem}
.logo-icon{width:60px;height:60px;border-radius:16px;margin:0 auto .75rem;background:linear-gradient(135deg,var(--ok,#22c55e),var(--a));display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 8px 24px rgba(34,197,94,.3)}
.logo h1{font-size:1.35rem;font-weight:800;color:#fff;margin-bottom:.2rem}
.logo p{color:var(--dim);font-size:.84rem}
.alert-box{border-radius:10px;padding:.7rem 1rem;font-size:.84rem;display:none;margin-bottom:1rem;align-items:center;gap:.6rem}
.alert-box.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.alert-box.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac}
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.75rem;font-weight:700;color:#a5b4fc;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em}
.input-wrap{position:relative}
.input-wrap .ico{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--dim);font-size:.82rem;pointer-events:none}
.input-wrap input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);padding:.72rem .9rem .72rem 2.4rem;font-size:clamp(.85rem,3vw,.9rem);outline:none;transition:all .2s;-webkit-appearance:none}
.input-wrap input:focus{border-color:var(--p);background:rgba(79,70,229,.08);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.input-wrap input::placeholder{color:var(--muted)}
.eye-btn{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;padding:.2rem;font-size:.82rem}
.strength-bar{height:3px;background:rgba(255,255,255,.07);border-radius:99px;margin-top:.45rem;overflow:hidden}
.strength-fill{height:100%;border-radius:99px;transition:width .3s,background .3s;width:0%}
.strength-hint{font-size:.73rem;margin-top:.2rem;min-height:1em}
.btn-submit{width:100%;background:linear-gradient(135deg,var(--p),var(--s));border:none;color:#fff;padding:.875rem;border-radius:11px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-submit:hover{opacity:.9;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none}
.auth-footer{text-align:center;margin-top:1.3rem;font-size:.855rem;color:var(--dim)}
.auth-footer a{color:var(--a);font-weight:600;text-decoration:none}
@media(max-width:480px){.auth-card{border-radius:14px;padding:1.4rem}.logo-icon{width:50px;height:50px}.logo h1{font-size:1.2rem}}
.auth-wrap{overflow-x:hidden}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">

    <div class="logo">
      <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
      <h1>Reset Password</h1>
      <p>Enter your new password below</p>
    </div>

    <div class="alert-box error" id="err-box"><i class="fas fa-exclamation-circle"></i><span id="err-msg"></span></div>
    <div class="alert-box success" id="ok-box"><i class="fas fa-check-circle"></i><span id="ok-msg"></span></div>

    <div class="field">
      <label>New Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock ico"></i>
        <input type="password" id="password" placeholder="Min 6 characters"
               autocomplete="new-password" oninput="checkStrength(this.value)"/>
        <button type="button" class="eye-btn" onclick="togglePwd('password',this)" tabindex="-1">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="str-fill"></div></div>
      <p class="strength-hint" id="str-hint"></p>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock ico"></i>
        <input type="password" id="confirm" placeholder="Repeat new password"
               autocomplete="new-password"
               onkeydown="if(event.key==='Enter')resetPwd()"/>
        <button type="button" class="eye-btn" onclick="togglePwd('confirm',this)" tabindex="-1">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn-submit" id="btn-reset" onclick="resetPwd()">
      <i class="fas fa-check"></i>Set New Password
    </button>

    <div class="auth-footer"><a href="/login"><i class="fas fa-arrow-left me-1"></i>Back to Sign In</a></div>
  </div>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get('token') || '';
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  const ico = btn.querySelector('i');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
function checkStrength(pwd) {
  let s = 0;
  if (pwd.length >= 6) s++; if (pwd.length >= 10) s++;
  if (/[A-Z]/.test(pwd)) s++; if (/[0-9]/.test(pwd)) s++;
  if (/[^A-Za-z0-9]/.test(pwd)) s++;
  const lvl = [
    {w:'0%',c:'',t:''},
    {w:'25%',c:'#ef4444',t:'Weak'},
    {w:'50%',c:'#f59e0b',t:'Fair'},
    {w:'75%',c:'#06b6d4',t:'Good'},
    {w:'100%',c:'#22c55e',t:'Strong ✓'},
  ];
  const l = lvl[Math.min(s,4)];
  document.getElementById('str-fill').style.cssText = `width:${l.w};background:${l.c}`;
  const h = document.getElementById('str-hint');
  h.textContent = l.t; h.style.color = l.c;
}
async function resetPwd() {
  const pwd = document.getElementById('password').value;
  const cfm = document.getElementById('confirm').value;
  const btn = document.getElementById('btn-reset');
  document.getElementById('err-box').style.display = 'none';
  if (!pwd || !cfm) { showErr('Please fill in both fields.'); return; }
  if (pwd.length < 6) { showErr('Password must be at least 6 characters.'); return; }
  if (pwd !== cfm) { showErr('Passwords do not match.'); return; }
  if (!TOKEN) { showErr('Invalid reset link. Please request a new one.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';
  try {
    const res  = await fetch('/api/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({token: TOKEN, password: pwd})
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error || 'Reset failed.'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i>Set New Password'; return; }
    document.getElementById('ok-msg').textContent = 'Password updated! Redirecting to login…';
    document.getElementById('ok-box').style.display = 'flex';
    setTimeout(() => { window.location.href = '/login'; }, 1800);
  } catch(e) {
    showErr('Network error. Please try again.');
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i>Set New Password';
  }
}
function showErr(msg) {
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err-box').style.display = 'flex';
}
</script>
</body>
</html>
