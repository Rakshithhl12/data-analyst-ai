<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
<title>Create Account — DataAnalyst AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
:root{
  --p:#4f46e5;--s:#7c3aed;--a:#06b6d4;--ok:#22c55e;--err:#ef4444;
  --bg:#0a0a1a;--card:#12122a;--bdr:rgba(255,255,255,.08);
  --txt:#e2e8f0;--dim:#64748b;--sub:#94a3b8;--muted:#475569
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--txt);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background-image:
    radial-gradient(ellipse 90% 70% at 50% -5%,rgba(124,58,237,.2),transparent),
    radial-gradient(ellipse 40% 40% at 10% 90%,rgba(6,182,212,.08),transparent);
  padding:1.5rem 1rem
}
.auth-wrap{width:100%;max-width:440px}
.auth-card{
  background:var(--card);border:1px solid var(--bdr);border-radius:20px;
  padding:clamp(1.5rem,5vw,2.5rem);
  box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.03) inset
}
.logo{text-align:center;margin-bottom:1.6rem}
.logo-icon{
  width:60px;height:60px;border-radius:16px;margin:0 auto .75rem;
  background:linear-gradient(135deg,var(--s),var(--a));
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;box-shadow:0 8px 24px rgba(124,58,237,.4)
}
.logo h1{font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:.2rem}
.logo p{color:var(--dim);font-size:.85rem}

/* Benefits */
.benefits{
  display:grid;grid-template-columns:1fr 1fr;gap:.5rem;
  margin-bottom:1.4rem
}
.ben{
  display:flex;align-items:center;gap:.5rem;
  background:rgba(79,70,229,.08);border:1px solid rgba(79,70,229,.15);
  border-radius:8px;padding:.45rem .65rem;
  font-size:.76rem;color:#a5b4fc
}
.ben i{color:var(--a);flex-shrink:0;font-size:.72rem}
@media(max-width:360px){.benefits{grid-template-columns:1fr}}

/* Alert */
.alert-box{
  border-radius:10px;padding:.7rem 1rem;font-size:.84rem;
  display:none;margin-bottom:1rem;align-items:center;gap:.6rem
}
.alert-box.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.alert-box.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac}

/* Form */
.field{margin-bottom:1rem}
.field label{
  display:block;font-size:.75rem;font-weight:700;color:#a5b4fc;
  margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em
}
.input-wrap{position:relative}
.input-wrap .ico{
  position:absolute;left:.9rem;top:50%;transform:translateY(-50%);
  color:var(--dim);font-size:.82rem;pointer-events:none;transition:color .2s
}
.input-wrap input{
  width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bdr);
  border-radius:10px;color:var(--txt);
  padding:.75rem 1rem .75rem 2.5rem;font-size:.9rem;
  outline:none;transition:all .2s;-webkit-appearance:none
}
.input-wrap input:focus{border-color:var(--p);background:rgba(79,70,229,.08);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.input-wrap:focus-within .ico{color:#a5b4fc}
.input-wrap input::placeholder{color:var(--muted)}
.eye-btn{
  position:absolute;right:.85rem;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--dim);cursor:pointer;
  padding:.2rem;font-size:.82rem;transition:color .2s
}
.eye-btn:hover{color:var(--sub)}

/* Strength bar */
.strength-bar{height:3px;background:rgba(255,255,255,.07);border-radius:99px;margin-top:.45rem;overflow:hidden}
.strength-fill{height:100%;border-radius:99px;transition:width .3s,background .3s;width:0%}
.strength-hint{font-size:.73rem;margin-top:.2rem;min-height:1em}

/* Submit */
.btn-submit{
  width:100%;background:linear-gradient(135deg,var(--p),var(--s));
  border:none;color:#fff;padding:.875rem;border-radius:11px;
  font-size:.95rem;font-weight:700;cursor:pointer;
  transition:all .2s;margin-top:.3rem;
  display:flex;align-items:center;justify-content:center;gap:.5rem
}
.btn-submit:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(79,70,229,.35)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

.or-divider{
  text-align:center;margin:1.2rem 0;position:relative;
  color:var(--muted);font-size:.8rem
}
.or-divider::before,.or-divider::after{
  content:'';position:absolute;top:50%;
  width:44%;height:1px;background:var(--bdr)
}
.or-divider::before{left:0}.or-divider::after{right:0}

.btn-google{
  width:100%;background:rgba(255,255,255,.06);border:1px solid var(--bdr);
  border-radius:11px;padding:.8rem;color:var(--txt);
  font-size:.9rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.65rem;
  transition:all .2s;text-decoration:none
}
.btn-google:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);color:#fff}
.btn-google img{width:18px;height:18px}

.auth-footer{text-align:center;margin-top:1.3rem;font-size:.855rem;color:var(--dim)}
.auth-footer a{color:var(--a);font-weight:600;text-decoration:none}
.auth-footer a:hover{text-decoration:underline}

.terms{font-size:.75rem;color:var(--muted);text-align:center;margin-top:.9rem;line-height:1.5}
.terms a{color:var(--dim);text-decoration:underline}
@media(max-width:400px){.auth-card{border-radius:14px;padding:1.4rem}.logo-icon{width:50px;height:50px;font-size:1.3rem}.logo h1{font-size:1.2rem}.btn-submit{padding:.75rem}}
.auth-wrap{overflow-x:hidden}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">

    <div class="logo">
      <div class="logo-icon">⚡</div>
      <h1>DataAnalyst AI</h1>
      <p>Create your free account</p>
    </div>

    <div class="benefits">
      <div class="ben"><i class="fas fa-check-circle"></i>Unlimited uploads</div>
      <div class="ben"><i class="fas fa-check-circle"></i>AI insights</div>
      <div class="ben"><i class="fas fa-check-circle"></i>PDF reports</div>
      <div class="ben"><i class="fas fa-check-circle"></i>Chat with data</div>
    </div>

    <div class="alert-box error" id="err-box"><i class="fas fa-exclamation-circle"></i><span id="err-msg"></span></div>
    <div class="alert-box success" id="ok-box"><i class="fas fa-check-circle"></i><span id="ok-msg"></span></div>

    <div class="field">
      <label>Full Name</label>
      <div class="input-wrap">
        <i class="fas fa-user ico"></i>
        <input type="text" id="name" placeholder="John Doe" autocomplete="name"/>
      </div>
    </div>

    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope ico"></i>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock ico"></i>
        <input type="password" id="password" placeholder="Min 6 characters"
               autocomplete="new-password"
               oninput="checkStrength(this.value)"
               onkeydown="if(event.key==='Enter')register()"/>
        <button type="button" class="eye-btn" onclick="togglePwd('password',this)" tabindex="-1">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="str-fill"></div></div>
      <p class="strength-hint" id="str-hint"></p>
    </div>

    <button class="btn-submit" id="btn-reg" onclick="register()">
      <i class="fas fa-user-plus"></i>Create Account
    </button>

    <p class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>

    <div class="auth-footer">Already have an account? <a href="/login">Sign in</a></div>
  </div>
</div>

<script>
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  const ico = btn.querySelector('i');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
function checkStrength(pwd) {
  let s = 0;
  if (pwd.length >= 6)  s++;
  if (pwd.length >= 10) s++;
  if (/[A-Z]/.test(pwd)) s++;
  if (/[0-9]/.test(pwd)) s++;
  if (/[^A-Za-z0-9]/.test(pwd)) s++;
  const lvl = [
    {w:'0%',  c:'',         t:''},
    {w:'25%', c:'#ef4444',  t:'Weak'},
    {w:'50%', c:'#f59e0b',  t:'Fair'},
    {w:'75%', c:'#06b6d4',  t:'Good'},
    {w:'100%',c:'#22c55e',  t:'Strong ✓'},
  ];
  const l = lvl[Math.min(s, 4)];
  const f = document.getElementById('str-fill');
  const h = document.getElementById('str-hint');
  f.style.width = l.w; f.style.background = l.c;
  h.textContent = l.t; h.style.color = l.c;
}
function showErr(msg) {
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err-box').style.display = 'flex';
  document.getElementById('ok-box').style.display = 'none';
}
function showOk(msg) {
  document.getElementById('ok-msg').textContent = msg;
  document.getElementById('ok-box').style.display = 'flex';
  document.getElementById('err-box').style.display = 'none';
}
async function register() {
  const name  = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('password').value;
  const btn   = document.getElementById('btn-reg');
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('ok-box').style.display = 'none';
  if (!name || !email || !pwd) { showErr('Please fill in all fields.'); return; }
  if (pwd.length < 6) { showErr('Password must be at least 6 characters.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account…';
  try {
    const res  = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password: pwd})
    });
    const data = await res.json();
    if (!res.ok) {
      showErr(data.error || 'Registration failed.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i>Create Account';
      return;
    }
    showOk('Account created! Redirecting…');
    setTimeout(() => { window.location.href = '/'; }, 1000);
  } catch(e) {
    showErr('Network error. Please try again.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-user-plus"></i>Create Account';
  }
}
</script>
</body>
</html>
