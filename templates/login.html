<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — DataAnalyst AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
:root{--p:#4f46e5;--s:#7c3aed;--a:#06b6d4;--bg:#0f0f23;--card:#1a1a2e;--bdr:rgba(255,255,255,.08);--txt:#e2e8f0;--dim:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(79,70,229,.3),transparent),var(--bg)}
.auth-box{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:2.5rem;
  width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:2rem}
.logo .icon{font-size:2.5rem;display:block;margin-bottom:.5rem}
.logo h1{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#fff,var(--a));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo p{color:var(--dim);font-size:.875rem;margin-top:.25rem}
.form-group{margin-bottom:1.2rem}
.form-label{display:block;font-size:.82rem;font-weight:600;color:#a5b4fc;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
.form-control{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:10px;
  color:var(--txt);padding:.75rem 1rem .75rem 2.6rem;font-size:.9rem;outline:none;transition:border-color .2s}
.form-control:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.form-control::placeholder{color:var(--dim)}
.btn-auth{width:100%;background:linear-gradient(135deg,var(--p),var(--s));border:none;color:#fff;
  padding:.85rem;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:.5rem}
.btn-auth:hover{opacity:.9;transform:translateY(-1px)}
.btn-auth:disabled{opacity:.5;cursor:not-allowed;transform:none}
.divider{text-align:center;margin:1.2rem 0;position:relative;color:var(--dim);font-size:.85rem}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--bdr)}
.divider::before{left:0}.divider::after{right:0}
.link-text{text-align:center;font-size:.875rem;color:var(--dim)}
.link-text a{color:var(--a);font-weight:600;text-decoration:none}
.error-msg{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;
  padding:.7rem 1rem;font-size:.85rem;color:#f87171;margin-bottom:1rem;display:none}
.input-wrap{position:relative}
.input-wrap i{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--dim);font-size:.85rem;pointer-events:none}
</style>
</head>
<body>
<div class="auth-box">
  <div class="logo">
    <span class="icon">⚡</span>
    <h1>DataAnalyst AI</h1>
    <p>Sign in to your account</p>
  </div>
  <div class="error-msg" id="error-msg"></div>
  <div class="form-group">
    <label class="form-label">Email Address</label>
    <div class="input-wrap">
      <i class="fas fa-envelope"></i>
      <input type="email" class="form-control" id="email" placeholder="you@example.com"/>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <div class="input-wrap">
      <i class="fas fa-lock"></i>
      <input type="password" class="form-control" id="password" placeholder="Your password"
             onkeydown="if(event.key==='Enter')login()"/>
    </div>
  </div>
  <button class="btn-auth" id="btn-login" onclick="login()">
    <i class="fas fa-sign-in-alt me-2"></i>Sign In
  </button>
  <div class="divider">or</div>
  <div class="link-text">Don't have an account? <a href="/register">Create one free</a></div>
</div>
<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('password').value;
  const btn   = document.getElementById('btn-login');
  const err   = document.getElementById('error-msg');
  err.style.display = 'none';
  if (!email || !pwd) { showErr('Please fill in all fields.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in…';
  try {
    const res  = await fetch('/api/login', {method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pwd})});
    const data = await res.json();
    if (!res.ok) {
      showErr(data.error || 'Login failed');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
      return;
    }
    window.location.href = '/';
  } catch(e) {
    showErr('Network error. Please try again.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
  }
}
function showErr(msg) {
  const e = document.getElementById('error-msg');
  e.textContent = '❌ ' + msg; e.style.display = 'block';
}
</script>
</body>
</html>
